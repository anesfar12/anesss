# ═══════════════════════════════════════════════════════════════════════════
# LUXE POS v5.1 — Docker Compose (Local Development)
# Blueprint Section 12 deployment topology
# ═══════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── PostgreSQL 18 (local dev — Supabase in production) ───────────────────
  postgres:
    image: pgvector/pgvector:pg18
    container_name: luxe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: luxe_dev_password
      POSTGRES_DB: luxepos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/sql:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c shared_preload_libraries=pg_cron,vector
        -c cron.database_name=luxepos
        -c max_connections=100
        -c shared_buffers=256MB
        -c work_mem=4MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luxepos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Upstash in production) ────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: luxe_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── ChromaDB 0.7+ HNSW (Hetzner VPS in production) ───────────────────────
  chromadb:
    image: chromadb/chroma:0.7.0
    container_name: luxe_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      CHROMA_SERVER_AUTHN_PROVIDER: ""
      ANONYMIZED_TELEMETRY: "false"
      CHROMA_SERVER_HTTP_PORT: "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── NestJS API (Port 3000) ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: luxe_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:luxe_dev_password@postgres:5432/luxepos
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: luxe-dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app:delegated
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Python AI Microservice (Port 8000) ────────────────────────────────────
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: luxe_ai
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://postgres:luxe_dev_password@postgres:5432/luxepos
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      PYTHON_JIT: "0"    # Fix 8: disabled until Python 3.15
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./apps/ai-service:/app:delegated

  # ── Next.js POS Terminal (Port 3001) ─────────────────────────────────────
  pos:
    build:
      context: ./apps/pos
      dockerfile: Dockerfile
    container_name: luxe_pos
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
    depends_on:
      - api

  # ── Next.js Dashboard (Port 3002) ─────────────────────────────────────────
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: luxe_dashboard
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  chromadb_data:

networks:
  default:
    name: luxe_network
